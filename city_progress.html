const P = r => (r*100).toFixed(1)+'%';

function rClass(r) {
  if (r >= 1.5) return 'rc-s';
  if (r >= 1.0) return 'rc-g';
  if (r >= 0.6) return 'rc-w';
  return 'rc-b';
}
function fClass(r) {
  if (r >= 1.0) return 'fc-blue';
  if (r >= 0.7) return 'fc-green';
  if (r >= 0.4) return 'fc-yellow';
  return 'fc-red';
}
function bClass(r) {
  if (r >= 1.5) return 'b-super';
  if (r >= 1.0) return 'b-good';
  if (r >= 0.6) return 'b-warn';
  return 'b-bad';
}
function bLabel(r) {
  if (r >= 1.5) return '超额 🔥';
  if (r >= 1.0) return '达标 ✅';
  if (r >= 0.6) return '追赶中';
  return '需关注 ⚠️';
}
function barW(r) { return Math.min(r * 100, 100) + '%'; }

function emoji(c) {
  if (c.includes('京津冀')) return '🏙️';
  if (c.includes('黑吉辽')) return '🧊';
  if (c.includes('山东')) return '🌊';
  return '📍';
}

          <div class="mini-l">正餐品牌数</div>
          <div class="mini-v">${d.正餐品牌} 个</div>
          <div class="mini-s">客单 ${d.正餐客单 > 0 ? (d.正餐客单/10000).toFixed(1)+'万' : '—'}</div>
        </div>
        <div class="mini-item">
          <div class="mini-l">非正餐品牌数</div>
          <div class="mini-v">${d.非正餐品牌 || 0} 个</div>
        </div>
        <div class="mini-item">
          <div class="mini-l">续签回款</div>
          <div class="mini-v">${W(d.续签)}</div>
        </div>
        <div class="mini-item">
          <div class="mini-l">增购回款</div>
          <div class="mini-v">${W(d.增购)}</div>
        </div>
      </div>

      <div class="divider"></div>
      <!-- 在途商机 -->
      <div class="pipeline">
        <div class="pl-item"><span class="pl-l">在途商机</span><span class="pl-v">${W(d.在途)}</span></div>
        <div class="pl-item"><span class="pl-l">月末预估</span><span class="pl-v pl-e">${P(d.预估)}</span></div>
        <div class="pl-item"><span class="pl-l">正餐在途</span><span class="pl-v">${W(d.正餐在途)}</span></div>
        <div class="pl-item"><span class="pl-l">正餐预估</span><span class="pl-v pl-e">${P(d.正餐预估)}</span></div>
      </div>

      <!-- 诊断 -->
      <div class="diag ${diag.cls}">${diag.html}</div>
    </div>
  </div>`;
}

function renderSummary(rows) {
  const sum = (k) => rows.reduce((s,r) => s + (parseFloat(r[k]) || 0), 0);
  const 总回款 = sum('回款'); const 总回款目标 = sum('回款目标');
  const 总安装 = sum('安装'); const 总安装目标 = sum('安装目标');
  const 总正餐 = sum('正餐'); const 总正餐目标 = sum('正餐目标');
  const 总在途 = sum('在途');

  document.getElementById('summaryGrid').innerHTML = `
    <div class="sg-item"><div class="sg-l">销售回款（剔退款）</div><div class="sg-v">${W(总回款)}</div><div class="sg-r"><span class="rc ${rClass(总回款/总回款目标)}">${P(总回款/总回款目标)}</span> / 目标${W(总回款目标)}</div></div>
    <div class="sg-item"><div class="sg-l">销售安装毛利</div><div class="sg-v">${W(总安装)}</div><div class="sg-r"><span class="rc ${rClass(总安装/总安装目标)}">${P(总安装/总安装目标)}</span> / 目标${W(总安装目标)}</div></div>
    <div class="sg-item"><div class="sg-l">正餐新签专项</div><div class="sg-v">${W(总正餐)}</div><div class="sg-r"><span class="rc ${rClass(总正餐/总正餐目标)}">${P(总正餐/总正餐目标)}</span> / 目标${W(总正餐目标)}</div></div>
    <div class="sg-item"><div class="sg-l">三城市在途商机</div><div class="sg-v">${W(总在途)}</div><div class="sg-r" style="color:#58a6ff">合计储备</div></div>
  `;
}

function render(period) {
  const rows = ROWS.filter(r => r.p === period);
  renderSummary(rows);
  document.getElementById('citiesGrid').innerHTML = rows.map(renderCityCard).join('');
  document.getElementById('lastUpdate').textContent = `数据更新：${META.updatedAt}（${META.dataNote}）`;
  document.getElementById('footer').textContent = `数据来源：美团魔数 BI 246432 · 更新于 ${META.updatedAt} · 城市口径`;
}

function selectPeriod(btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(btn.dataset.p);
}

render('2026-04');
</script>
</body>
</html>
