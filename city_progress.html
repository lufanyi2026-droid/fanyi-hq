.last-update { font-size:10px; color:#484f58; margin-top:3px; text-align:right; }

/* 时段+视图切换 */

.btn { padding:5px 13px; border-radius:6px; border:1px solid #30363d; background:#161b22; color:#8b949e; cursor:pointer; font-size:12px; font-weight:600; transition:all .15s; }
.btn:hover { border-color:#ff8c00; color:#ff8c00; }
.btn.active { background:rgba(255,140,0,.15); border-color:#ff8c00; color:#ff8c00; }

.section-title { font-size:11px; color:#58a6ff; font-weight:700; margin:12px 0 8px; display:flex; align-items:center; gap:5px; }
.section-title::before { content:''; display:inline-block; width:3px; height:12px; border-radius:2px; background:#58a6ff; }
.section-title.orange::before { background:#ff8c00; }
.section-title.green::before { background:#3fb950; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; }
.kpi { background:#0d1117; border-radius:8px; padding:10px 12px; }
.kpi-l { font-size:10px; color:#7d8590; margin-bottom:3px; }
.kpi-v { font-size:16px; font-weight:700; color:#fff; }
.kpi-r { font-size:11px; margin-top:2px; }
.divider { border-top:1px solid #21262d; margin:12px 0; }

/* 城市卡片 */
.cities-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:14px; margin-bottom:20px; }
.city-card { background:#161b22; border:1px solid #30363d; border-radius:14px; overflow:hidden; }
.city-header { padding:12px 16px; background:#1c2128; border-bottom:1px solid #30363d; display:flex; align-items:center; justify-content:space-between; }
.city-name { font-size:15px; font-weight:700; color:#fff; }
.badge { font-size:10px; padding:3px 9px; border-radius:10px; font-weight:700; }
.b-super { background:rgba(88,166,255,.15); color:#58a6ff; border:1px solid rgba(88,166,255,.3); }
.b-good { background:rgba(63,185,80,.15); color:#3fb950; border:1px solid rgba(63,185,80,.3); }
.b-warn { background:rgba(210,153,34,.15); color:#d29922; border:1px solid rgba(210,153,34,.3); }
.b-bad { background:rgba(248,81,73,.15); color:#f85149; border:1px solid rgba(248,81,73,.3); }

.city-body { padding:13px 15px; }
.csect { margin-bottom:14px; }
.csect-title { font-size:10px; color:#58a6ff; font-weight:700; margin-bottom:8px; letter-spacing:.5px; }
.csect-title.orange { color:#ff8c00; }
.csect-title.green { color:#3fb950; }

/* 指标行 */
.mrow { margin-bottom:10px; }
.mrow-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; gap:6px; }
.mname { font-size:11px; color:#8b949e; flex-shrink:0; }
.mvals { font-size:11px; text-align:right; white-space:nowrap; }

.rc-s { color:#58a6ff; } .rc-g { color:#3fb950; } .rc-w { color:#d29922; } .rc-b { color:#f85149; }
.pbar-wrap { height:5px; background:#21262d; border-radius:3px; overflow:hidden; }
.pbar-fill { height:100%; border-radius:3px; transition:width .4s ease; }
.fc-blue { background:linear-gradient(90deg,#1d4ed8,#58a6ff); }
.fc-green { background:linear-gradient(90deg,#238636,#3fb950); }
.fc-yellow { background:linear-gradient(90deg,#9e6a03,#d29922); }
.fc-red { background:linear-gradient(90deg,#b91c1c,#f85149); }

/* 小格子 */
.mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.mini-3 { grid-template-columns:1fr 1fr 1fr; }
.mini-item { background:#0d1117; border-radius:7px; padding:8px 10px; }
.mini-l { font-size:10px; color:#7d8590; margin-bottom:2px; }
.mini-v { font-size:12px; font-weight:700; color:#e6edf3; }
.mini-s { font-size:9px; color:#484f58; margin-top:1px; }

/* 在途/预估行 */
.pipeline { display:flex; gap:12px; flex-wrap:wrap; margin-top:4px; }
.pl-item { font-size:11px; }
.pl-l { color:#7d8590; }
.pl-v { color:#58a6ff; font-weight:700; font-size:12px; margin-left:2px; }
.pl-e { color:#3fb950; font-size:11px; margin-left:2px; }

/* 诊断 */
.diag { margin-top:10px; padding:9px 12px; border-radius:7px; font-size:11px; line-height:1.65; }
.diag-good { background:rgba(63,185,80,.07); border:1px solid rgba(63,185,80,.2); color:#7ee787; }
.diag-warn { background:rgba(210,153,34,.07); border:1px solid rgba(210,153,34,.2); color:#e3b341; }

footer { text-align:center; margin-top:20px; font-size:10px; color:#484f58; }

@media (max-width:480px) {

// ===== 工具 =====
const W = n => (n||0).toFixed(1) + '万';
const P = r => r.toFixed(1) + '%';
const barW = r => Math.min((r/100) * 100, 100) + '%';

function rcClass(r) {
  if (r >= 150) return 'rc-s';
  if (r >= 100) return 'rc-g';
  if (r >= 60)  return 'rc-w';
  return 'rc-b';
}
function fcClass(r) {
  if (r >= 100) return 'fc-blue';
  if (r >= 70)  return 'fc-green';
  if (r >= 40)  return 'fc-yellow';
  return 'fc-red';
}
function bClass(r) {
  if (r >= 150) return 'b-super';
  if (r >= 100) return 'b-good';
  if (r >= 60)  return 'b-warn';
  return 'b-bad';
}
function bLabel(r) {
  if (r >= 150) return '超额 🔥';
  if (r >= 100) return '达标 ✅';
  if (r >= 60)  return '追赶中';
  return '需关注 ⚠️';
}
function emoji(c) {
  if (c.includes('京津冀')) return '🏙️';
  if (c.includes('黑吉辽')) return '🧊';
  if (c.includes('山东'))   return '🌊';
  return '📍';
}

function mrow(label, val, target, rate, showBar=true) {
  const rc = rcClass(rate);
  const fc = fcClass(rate);
  return `<div class="mrow">
    <div class="mrow-top">
      <span class="mname">${label}</span>
      <span class="mvals"><strong>${W(val)}</strong> / ${W(target)} <span class="rc ${rc}">${P(rate)}</span></span>
    </div>
    ${showBar ? `<div class="pbar-wrap"><div class="pbar-fill ${fc}" style="width:${barW(rate)}"></div></div>` : ''}
  </div>`;
}

function diagText(d) {
  const lines = []; let cls = 'diag-warn';
  const c = d.c;
  if (c === '京津冀') {
    if (d.正餐率 > 200) { lines.push('🔥 正餐专项大幅超额，客单' + d.正餐客单.toFixed(1) + '万/品牌，保持节奏'); cls='diag-good'; }
    if (d.月末预估 > 120) lines.push('✅ 月末预估' + P(d.月末预估) + '，在途' + W(d.商机储备) + '充沛');
    if (d.销售安装率 < 50) lines.push('⚠️ 安装' + P(d.销售安装率) + '，需推进安装排期');
    if (d.非正餐率 < 30) lines.push('📌 非正餐新签' + P(d.非正餐率) + '，在途' + W(d.非正餐在途) + '待转化');
  } else if (c === '黑吉辽') {
    if (d.正餐率 > 500) { lines.push('🔥 正餐单笔43万大单！华北正餐标杆，Q2首笔成单'); cls='diag-good'; }
    if (d.销售安装率 < 30) lines.push('⚠️ 安装' + P(d.销售安装率) + '，为三城最低，需重点跟进交付排期');
    if (d.非正餐率 < 10) lines.push('📌 非正餐新签仅' + P(d.非正餐率) + '，在途' + W(d.非正餐在途) + '需加速转化');
  } else if (c === '山东') {
    if (d.销售回款 < 5 && d.销售回款目标 > 100) { lines.push('🚨 4月回款极低（' + W(d.销售回款) + '），请核实是否有数据延迟'); cls='diag-bad'; }
    lines.push('📌 月末预估' + P(d.月末预估) + '，商机储备' + W(d.商机储备) + '，需推进转化');
  }
  if (lines.length === 0) lines.push('📊 数据正常，继续保持节奏');
  return { html: lines.join('<br>'), cls };
}

// ===== 渲染大区合计 =====
function renderRegion(rows) {
  const s = (k) => rows.reduce((sum,r) => sum + (r[k]||0), 0);
  const d = rows[0]; // 客成/销服用大区口径（三行数据一样）
  const html = `
    <div class="section-title">🔵 销售口（三城市合计）</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-l">销服回款（剔退款）</div><div class="kpi-v">${W(d.销服回款_大区)}</div><div class="kpi-r" style="color:#8b949e">销售+客成</div></div>
      <div class="kpi"><div class="kpi-l">销售回款（剔退款）</div><div class="kpi-v">${W(s('销售回款'))}</div><div class="kpi-r"><span class="rc ${rcClass(s('销售回款')/s('销售回款目标')*100)}">${P(s('销售回款')/s('销售回款目标')*100)}</span> / ${W(s('销售回款目标'))}</div></div>
      <div class="kpi"><div class="kpi-l">新签回款</div><div class="kpi-v">${W(s('新签回款'))}</div><div class="kpi-r"><span class="rc ${rcClass(s('新签回款')/s('新签回款目标')*100)}">${P(s('新签回款')/s('新签回款目标')*100)}</span> / ${W(s('新签回款目标'))}</div></div>
      <div class="kpi"><div class="kpi-l">正餐新签</div><div class="kpi-v">${W(s('正餐回款'))}</div><div class="kpi-r"><span class="rc ${rcClass(s('正餐回款')/s('正餐目标')*100)}">${P(s('正餐回款')/s('正餐目标')*100)}</span> / ${W(s('正餐目标'))}</div></div>
      <div class="kpi"><div class="kpi-l">非正餐新签</div><div class="kpi-v">${W(s('非正餐回款'))}</div><div class="kpi-r"><span class="rc ${rcClass(s('非正餐回款')/s('非正餐目标')*100)}">${P(s('非正餐回款')/s('非正餐目标')*100)}</span> / ${W(s('非正餐目标'))}</div></div>
      <div class="kpi"><div class="kpi-l">续签回款</div><div class="kpi-v">${W(s('续签回款'))}</div><div class="kpi-r" style="color:#8b949e">存量贡献</div></div>
      <div class="kpi"><div class="kpi-l">增购回款</div><div class="kpi-v">${W(s('增购回款'))}</div><div class="kpi-r" style="color:#8b949e">存量贡献</div></div>
      <div class="kpi"><div class="kpi-l">商机储备</div><div class="kpi-v">${W(s('商机储备'))}</div><div class="kpi-r" style="color:#58a6ff">三城合计</div></div>
    </div>
    <div class="section-title orange" style="margin-top:14px">🟡 客成口（华北大区）</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-l">客成回款</div><div class="kpi-v">${W(d.客成回款_大区)}</div><div class="kpi-r"><span class="rc ${rcClass(d.客成回款率_大区)}">${P(d.客成回款率_大区)}</span> / ${W(d.客成回款目标_大区)}</div></div>
      <div class="kpi"><div class="kpi-l">客成安装</div><div class="kpi-v">${W(d.客成安装_大区)}</div><div class="kpi-r"><span class="rc ${rcClass(d.客成安装率_大区)}">${P(d.客成安装率_大区)}</span> / ${W(d.客成安装目标_大区)}</div></div>
      <div class="kpi"><div class="kpi-l">续费回款</div><div class="kpi-v">${W(d.续费_大区)}</div><div class="kpi-r" style="color:#d29922">GRR ${P(d.GRR_大区)}</div></div>
    </div>
    <div class="section-title green" style="margin-top:14px">🟢 安装口（三城市合计）</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-l">销服安装</div><div class="kpi-v">${W(d.销服安装_大区)}</div><div class="kpi-r"><span class="rc ${rcClass(d.销服安装率_大区)}">${P(d.销服安装率_大区)}</span> / ${W(d.销服安装目标_大区)}</div></div>
      <div class="kpi"><div class="kpi-l">销售安装</div><div class="kpi-v">${W(s('销售安装'))}</div><div class="kpi-r"><span class="rc ${rcClass(s('销售安装')/s('销售安装目标')*100)}">${P(s('销售安装')/s('销售安装目标')*100)}</span> / ${W(s('销售安装目标'))}</div></div>
      <div class="kpi"><div class="kpi-l">客成安装</div><div class="kpi-v">${W(d.客成安装_大区)}</div><div class="kpi-r"><span class="rc ${rcClass(d.客成安装率_大区)}">${P(d.客成安装率_大区)}</span> / ${W(d.客成安装目标_大区)}</div></div>
    </div>
  `;
  document.getElementById('regionContent').innerHTML = html;
}

// ===== 渲染城市卡片 =====
function renderCityCard(d) {
  const diag = diagText(d);
  return `
  <div class="city-card">
    <div class="city-header">
      <div class="city-name">${emoji(d.c)} ${d.c}</div>
      <span class="badge ${bClass(d.销售回款率)}">${bLabel(d.销售回款率)}</span>
    </div>
    <div class="city-body">
      <!-- 回款 -->
      <div class="csect">
        <div class="csect-title">💰 回款</div>
        ${mrow('销售回款（剔退款）', d.销售回款, d.销售回款目标, d.销售回款率)}
        ${mrow('新签回款', d.新签回款, d.新签回款目标, d.新签率)}
        ${mrow('正餐新签', d.正餐回款, d.正餐目标, d.正餐率)}
        ${mrow('非正餐新签', d.非正餐回款, d.非正餐目标, d.非正餐率)}
        <div class="mini-grid" style="margin-top:8px">
          <div class="mini-item">
            <div class="mini-l">续签回款</div>
            <div class="mini-v">${W(d.续签回款)}</div>
          </div>
          <div class="mini-item">
            <div class="mini-l">增购回款</div>
            <div class="mini-v">${W(d.增购回款)}</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- 安装 -->
      <div class="csect">
        <div class="csect-title green">🔧 安装</div>
        ${mrow('销售安装毛利', d.销售安装, d.销售安装目标, d.销售安装率)}
      </div>

      <div class="divider"></div>

      <!-- 商机 & 正餐品牌 -->
      <div class="csect">
        <div class="csect-title orange">📊 商机储备</div>
        <div class="pipeline">
          <div class="pl-item"><span class="pl-l">在途储备</span><span class="pl-v">${W(d.商机储备)}</span></div>
          <div class="pl-item"><span class="pl-l">月末预估</span><span class="pl-v pl-e">${P(d.月末预估)}</span></div>
        </div>
        <div class="pipeline" style="margin-top:6px">
          <div class="pl-item"><span class="pl-l">正餐在途</span><span class="pl-v">${W(d.正餐在途)}</span></div>
          <div class="pl-item"><span class="pl-l">正餐预估</span><span class="pl-v pl-e">${P(d.正餐预估)}</span></div>
          <div class="pl-item"><span class="pl-l">正餐品牌</span><span class="pl-v">${d.正餐品牌}个</span></div>
          <div class="pl-item"><span class="pl-l">正餐客单</span><span class="pl-v">${d.正餐客单 > 0 ? d.正餐客单.toFixed(1)+'万' : '—'}</span></div>
        </div>
        <div class="pipeline" style="margin-top:6px">
          <div class="pl-item"><span class="pl-l">非正餐在途</span><span class="pl-v">${W(d.非正餐在途)}</span></div>
          <div class="pl-item"><span class="pl-l">非正餐预估</span><span class="pl-v pl-e">${P(d.非正餐预估)}</span></div>
          <div class="pl-item"><span class="pl-l">非正餐品牌</span><span class="pl-v">${d.非正餐品牌}个</span></div>
        </div>
      </div>

      <!-- 诊断 -->
      <div class="diag ${diag.cls}">${diag.html}</div>
    </div>
  </div>`;
}

// ===== 主渲染 =====
let currentPeriod = '2026-04';

function render(period) {
  const rows = ROWS.filter(r => r.p === period);
  renderRegion(rows);
  document.getElementById('citiesGrid').innerHTML = rows.map(renderCityCard).join('');
  document.getElementById('lastUpdate').textContent = `更新：${META.updatedAt}（${META.dataNote}）`;
  document.getElementById('footer').textContent = `数据来源：美团魔数 BI 246432 · 更新于 ${META.updatedAt} · 客成口为华北大区维度`;
}

function selectPeriod(btn) {
  document.querySelectorAll('.btn[data-p]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPeriod = btn.dataset.p;
  render(currentPeriod);
}

render(currentPeriod);
</script>
</body>
</html>
